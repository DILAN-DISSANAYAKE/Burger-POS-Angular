<nav class="sticky top-0 z-50 bg-slate-900 shadow-xl border-b border-slate-800">
  <div class="container mx-auto px-6 py-3 flex justify-between items-center">
    
    <div class="flex items-center gap-3 cursor-pointer group">
      <img 
        src="/images/burgers/burgerIcon.png" 
        alt="DD's Burgers Logo" 
        class="w-12 h-12 rounded-full object-cover border-2 border-orange-500/50 shadow-lg group-hover:border-orange-500 transition-all"
        onerror="this.src='https://placehold.co/100x100/orange/white?text=Logo'"
      >
      <span class="text-2xl font-black text-white tracking-wide"> <span class="text-orange-500">Burgers Shop</span></span>
    </div>

    <div class="hidden md:flex space-x-8 text-slate-300 font-medium">
      <a routerLink="/home" class="text-orange-500">Home</a>
      <a routerLink="/home" fragment="about" class="hover:text-orange-500 transition-colors">About Us</a>
      <a routerLink="/home" fragment="contact" class="hover:text-orange-500 transition-colors">Contact Us</a>
    </div>

    <div class="flex items-center gap-3 sm:gap-4">
      
      <button routerLink="/cart" class="flex items-center gap-2 bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 text-white px-4 sm:px-6 py-2.5 rounded-full font-bold shadow-lg shadow-orange-500/30 transition-all hover:scale-105">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
        <span class="hidden sm:inline">Cart</span> ({{cartService.count()}})
      </button>

      <button routerLink="/login" class="hidden md:flex items-center gap-2 text-slate-400 hover:text-red-400 font-medium px-4 py-2.5 rounded-full border border-transparent hover:border-red-500/30 hover:bg-red-500/10 transition-all duration-300">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        <span>Logout</span>
      </button>

      <button (click)="toggleMenu()" class="md:hidden text-slate-300 hover:text-orange-500 focus:outline-none p-2 ml-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

    </div>
  </div>

  @if (isMenuOpen) {
    <div class="md:hidden bg-slate-900 border-t border-slate-800 shadow-xl pb-4">
      
      <div class="px-6 py-4 flex flex-col space-y-4 text-center border-b border-slate-800">
        <a routerLink="/home" (click)="toggleMenu()" class="text-orange-500 font-black text-lg">Home</a>
        <a routerLink="/home" fragment="about" (click)="toggleMenu()" class="text-slate-300 hover:text-orange-500 transition-colors font-medium text-lg">About Us</a>
        <a routerLink="/home" fragment="contact" (click)="toggleMenu()" class="text-slate-300 hover:text-orange-500 transition-colors font-medium text-lg">Contact Us</a>
      </div>
      
      <div class="px-6 pt-4">
        <button routerLink="/login" (click)="toggleMenu()" class="w-full flex justify-center items-center gap-2 bg-red-500/10 border border-red-500/20 text-red-400 hover:text-red-300 hover:bg-red-500/20 font-bold py-3 rounded-xl transition-all">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Logout
        </button>
      </div>

    </div>
  }
</nav>
